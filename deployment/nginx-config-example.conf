# Nginx configuration for Forta website
# Place this file in /etc/nginx/sites-available/ and create a symlink to /etc/nginx/sites-enabled/

server {
    # Listen on port 80 and redirect to HTTPS
    listen 80;
    server_name forta-usa.com www.forta-usa.com;
    
    # Redirect all HTTP requests to HTTPS
    return 301 https://$host$request_uri;
}

server {
    # Listen on port 443 for HTTPS connections
    listen 443 ssl http2;
    server_name forta-usa.com www.forta-usa.com;
    
    # SSL certificate configuration
    ssl_certificate /path/to/forta-website/deployment/cert/forta-usa.com.pem;
    ssl_certificate_key /path/to/forta-website/deployment/cert/forta-usa.com.key; # You'll need the private key
    
    # SSL settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers on;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    
    # HSTS (optional, but recommended)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    
    # Security headers
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    
    # Root directory
    root /path/to/forta-website/public;
    
    # Proxy settings for Next.js
    location / {
        proxy_pass http://localhost:3000; # Next.js server
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
    
    # Static assets
    location /_next/static {
        alias /path/to/forta-website/.next/static;
        expires 365d;
        access_log off;
    }
    
    # Public assets
    location /public {
        alias /path/to/forta-website/public;
        expires 365d;
        access_log off;
    }
    
    # Gzip compression
    gzip on;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Logging
    access_log /var/log/nginx/forta-usa.access.log;
    error_log /var/log/nginx/forta-usa.error.log;
}
